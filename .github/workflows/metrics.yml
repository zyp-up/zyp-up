name: Metrics Embed

on:
  schedule:
    - cron: '0 */12 * * *'  # 每12小时执行一次
  workflow_dispatch:        # 手动触发
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Base Info (Top)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.base.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Shanghai
          
      - name: Isometric Calendar (Left 1)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.iso.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
      - name: Languages (Right 1)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          
      - name: Topics & Licenses (Left 2)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.topics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          template: classic
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_licenses: yes
          plugin_licenses_setup: npm, yarn, pnpm
          
      - name: Habits and WakaTime (Right 2)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.habits.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          template: classic
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 365
          plugin_wakatime_limit: 5
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
