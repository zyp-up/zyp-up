name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Isometric commit calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          base: ""
          output_action: none
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Most used languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          base: ""
          output_action: none
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_threshold: 0%

      - name: Starred topics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.topics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          base: ""
          output_action: none
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

      - name: Repository licenses
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.licenses.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          base: ""
          output_action: none
          plugin_licenses: yes
          plugin_licenses_ratio: yes

      - name: Coding habits
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.habits.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          base: ""
          output_action: none
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

      - name: Follow-up of issues and pull requests
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.followup.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          base: ""
          output_action: none
          plugin_followup: yes
          plugin_followup_sections: repositories

      - name: Recent activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.activity.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          base: ""
          output_action: none
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_visibility: all
          plugin_activity_days: 14

      - name: Recent posts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.posts.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          base: ""
          output_action: none
          plugin_posts: yes
          plugin_posts_source: dev.to
          plugin_posts_limit: 4

      - name: Classic metrics overview
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: zyp-up
          output_action: none
          base: header,activity,community,repositories,metadata
          plugin_isocalendar: yes
          plugin_achievements: yes
          plugin_achievements_only: sponsor,maintainer,user

      - name: Commit metrics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update metrics [skip ci]"
          file_pattern: metrics*.svg
          skip_dirty_check: false
